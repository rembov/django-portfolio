<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ settings.title }}{% endblock %}</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;  /* чистый белый фон */
            color: #1e293b;       /* тёмно-серый для текста */
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* Лёгкие цветные акценты на фоне */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 40% 80%, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
            z-index: -2;
            pointer-events: none;
        }
        /* Плавающие частицы (светлые, но с цветным свечением) */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #3b82f6;
            box-shadow: 0 0 20px #3b82f6, 0 0 40px #8b5cf6;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
            animation: float 14s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-100vh) translateX(20vw); }
        }

        /* Навбар (полупрозрачный белый с неоновой нижней границей) */
        .navbar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.2);
            padding: 0.8rem 0;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #3b82f6;
            letter-spacing: 1px;
        }
        .nav-link {
            color: #1e293b;
            font-weight: 600;
            margin: 0 1rem;
            position: relative;
            transition: 0.2s;
            text-decoration: none;
        }
        .nav-link:hover {
            color: #3b82f6;
            text-shadow: 0 0 8px #3b82f6;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.2s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }

        /* Карточки (белые с лёгкой тенью и неоновой рамкой при наведении) */
        .card {
            border: none;
            border-radius: 28px;
            background: #ffffff;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: 0.3s;
            overflow: hidden;
            color: #1e293b;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: #8b5cf6;
            box-shadow: 0 20px 40px -12px #8b5cf6, 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .card-img-top {
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid #3b82f6;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }
        .btn-primary-custom {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 50px;
            padding: 0.5rem 1.8rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 8px 20px -6px #3b82f6;
            transition: 0.2s;
            display: inline-block;
            text-decoration: none;
        }
        .btn-primary-custom:hover {
            background: linear-gradient(45deg, #8b5cf6, #3b82f6);
            box-shadow: 0 12px 28px -8px #8b5cf6;
            color: white;
            transform: scale(1.02);
        }

        /* Пагинация (если будет) */
        .pagination .page-link {
            border: 1px solid #3b82f6;
            background: white;
            margin: 0 4px;
            border-radius: 40px;
            color: #3b82f6;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(59,130,246,0.2);
        }
        .pagination .page-item.active .page-link {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            color: white;
            border-color: #8b5cf6;
        }

        /* Формы */
        .form-control, .form-select {
            border-radius: 40px;
            background: #f8fafc;
            border: 2px solid #3b82f6;
            color: #1e293b;
            padding: 0.75rem 1.2rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139,92,246,0.2);
            background: #ffffff;
        }

        /* Футер */
        .footer {
            background: #f1f5f9;
            border-top: 2px solid #3b82f6;
            padding: 1.5rem 0;
            text-align: center;
            color: #334155;
            margin-top: 3rem;
        }

        /* Заголовки */
        h1, h2, h3 {
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            width: 100%;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Hero счётчик */
        .countdown {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #3b82f6;
        }

        /* Контактная информация и текст */
        .text-muted-custom {
            color: #475569;
        }
        .glass-form {
            background: #f8fafc;
            border-radius: 40px;
            padding: 2rem;
            border: 2px solid #3b82f6;
            box-shadow: 0 15px 35px -10px rgba(59,130,246,0.3);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Частицы -->
    <div class="particle" style="top: 10%; left: 5%; animation-duration: 14s;"></div>
    <div class="particle" style="top: 30%; left: 80%; animation-duration: 18s;"></div>
    <div class="particle" style="top: 70%; left: 20%; animation-duration: 12s;"></div>
    <div class="particle" style="top: 50%; left: 40%; animation-duration: 20s;"></div>
    <div class="particle" style="top: 85%; left: 70%; animation-duration: 16s;"></div>

    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">
                <i class="bi bi-stars" style="color: #3b82f6;"></i> {{ settings.title }}
            </a>
            <div class="d-flex">
                <a class="nav-link" href="{% url 'index' %}">Главная</a>
                {% if user.is_authenticated and user.is_staff %}
                    <a class="nav-link" href="{% url 'admin:index' %}">Админка</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; {% now "Y" %} {{ settings.title }}</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
