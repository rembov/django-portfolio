<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мастер на час{% endblock %}</title>
    <!-- Современный шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Сброс и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1e;  /* тёмная основа */
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Анимированный градиентный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.15) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.15) 0%, transparent 30%),
                        radial-gradient(circle at 40% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 40%),
                        #0a0f1e;
            z-index: -2;
            animation: shiftColors 15s infinite alternate;
        }

        @keyframes shiftColors {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* Плавающие частицы (глитч-эффект) */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: cyan;
            box-shadow: 0 0 10px cyan, 0 0 20px magenta;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-100vh) translateX(20vw); }
        }

        /* Навбар со стеклянным эффектом */
        .navbar {
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            letter-spacing: 2px;
            text-decoration: none;
            transition: 0.3s;
        }

        .navbar-brand:hover {
            text-shadow: 0 0 20px cyan, 0 0 40px magenta;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            position: relative;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, cyan, magenta);
            transition: width 0.3s ease;
        }

        .nav-link:hover::before {
            width: 100%;
        }

        .nav-link:hover {
            text-shadow: 0 0 8px cyan;
        }

        /* Основной контейнер */
        .main-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
        }

        /* Заголовки */
        h1, h2, h3 {
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #fff, #aaccff, #ffaaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            line-height: 1.2;
        }

        h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, cyan, magenta);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-left: 5px solid magenta;
            padding-left: 1rem;
        }

        /* Карточки (стекло) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .card {
            background: rgba(20, 30, 50, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            transition: 0.3s;
            color: #f0f0f0;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: magenta;
            box-shadow: 0 0 40px magenta, 0 0 60px cyan;
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .card:hover .card-img {
            border-color: cyan;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, cyan, magenta);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .card-text {
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .card-price {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px cyan;
            display: block;
            margin: 1rem 0;
        }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 1px;
            background: linear-gradient(45deg, cyan, magenta);
            color: #0a0f1e;
            box-shadow: 0 0 20px cyan;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px magenta, 0 0 50px cyan;
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: cyan;
            color: #0a0f1e;
            box-shadow: 0 0 30px cyan;
        }

        /* Форма обратной связи */
        .glass-form {
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(cyan, 0.3);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: cyan;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(cyan, 0.5);
            border-radius: 30px;
            font-size: 1rem;
            color: #fff;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: magenta;
            box-shadow: 0 0 20px magenta;
            background: rgba(0, 0, 0, 0.6);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* Контактная информация */
        .contact-info {
            background: rgba(20, 30, 50, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 2rem;
            border: 1px solid magenta;
        }

        .contact-info p {
            margin: 1rem 0;
            font-size: 1.2rem;
        }

        .contact-info a {
            color: cyan;
            text-decoration: none;
            border-bottom: 1px dashed cyan;
        }

        .contact-info a:hover {
            color: magenta;
            border-bottom-color: magenta;
        }

        /* Футер */
        .footer {
            text-align: center;
            padding: 2rem;
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(cyan, 0.3);
            margin-top: 4rem;
            color: #aaa;
        }

        /* Адаптация */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 2rem; }
            .navbar .container {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-menu {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Генерация плавающих частиц (можно через JS, но для простоты добавим фиксированное количество) -->
    <div class="particle" style="top: 10%; left: 5%; animation-duration: 12s;"></div>
    <div class="particle" style="top: 30%; left: 80%; animation-duration: 18s;"></div>
    <div class="particle" style="top: 70%; left: 20%; animation-duration: 15s;"></div>
    <div class="particle" style="top: 50%; left: 40%; animation-duration: 20s;"></div>
    <div class="particle" style="top: 85%; left: 70%; animation-duration: 14s;"></div>

    <nav class="navbar">
        <div class="container">
            <a href="{% url 'index' %}" class="navbar-brand">⚡Мастер на час⚡</a>
            <div class="nav-menu">
                <a href="{% url 'index' %}" class="nav-link">Главная</a>
                <a href="{% url 'services' %}" class="nav-link">Услуги</a>
                <a href="{% url 'contacts' %}" class="nav-link">Контакты</a>
            </div>
        </div>
    </nav>

    <main class="main-container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; {% now "Y" %} Мастер на час. Кибер-стиль и качество.</p>
    </footer>
</body>
</html>
