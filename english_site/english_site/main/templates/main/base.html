<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Easy Peasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .bubble { transition: all 0.2s ease; }
        .bubble:hover { transform: scale(1.05); }
        .correct { background-color: #10b981; color: white; }
        .incorrect { background-color: #ef4444; color: white; animation: shake 0.3s; }
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-5px); }
            75%{ transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-blue-200 min-h-screen">
    <nav class="bg-white shadow-lg p-4 flex flex-wrap justify-between items-center">
        <div class="flex space-x-4">
            <a href="{% url 'index' %}" class="text-xl font-bold text-purple-600"><i class="fas fa-home"></i> Главная</a>
            {% if user.is_authenticated %}
                <a href="{% url 'words' %}" class="text-xl font-bold text-purple-600"><i class="fas fa-book-open"></i> Слова</a>
                <a href="{% url 'game' %}" class="text-xl font-bold text-purple-600"><i class="fas fa-gamepad"></i> Игра</a>
                <a href="{% url 'grammar' %}" class="text-xl font-bold text-purple-600"><i class="fas fa-language"></i> Грамматика</a>
                <a href="{% url 'speaking' %}" class="text-xl font-bold text-purple-600"><i class="fas fa-microphone"></i> Говори!</a>
                <a href="{% url 'awards' %}" class="text-xl font-bold text-purple-600"><i class="fas fa-medal"></i> Награды</a>
            {% endif %}
        </div>
        <div class="flex space-x-2">
            {% if user.is_authenticated %}
                <span class="text-purple-600">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded-full hover:bg-red-600 transition">
                        Выйти
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="bg-green-500 text-white px-4 py-2 rounded-full hover:bg-green-600 transition">
                    Войти
                </a>
                <a href="{% url 'register' %}" class="bg-blue-500 text-white px-4 py-2 rounded-full hover:bg-blue-600 transition">
                    Регистрация
                </a>
            {% endif %}
        </div>
    </nav>
    <div class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </div>
    <script>
        async function reportResult(testType, correct) {
            const response = await fetch('{% url "check_answer" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({test_type: testType, correct: correct})
            });
            return await response.json();
        }
    </script>
</body>
</html>
